components:
  schemas:
    Category:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 100
        slug:
          type: string
          maxLength: 100
          pattern: ^[-a-zA-Z0-9_]+$
      required:
      - id
      - name
      - slug
    Login:
      type: object
      description: Request body for the login endpoint.
      properties:
        username:
          type: string
          writeOnly: true
        password:
          type: string
          writeOnly: true
      required:
      - password
      - username
    Order:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        customer_name:
          type: string
          maxLength: 200
        status:
          $ref: '#/components/schemas/StatusEnum'
        created_at:
          type: string
          format: date-time
          readOnly: true
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
      required:
      - created_at
      - customer_name
      - id
      - items
    OrderItem:
      type: object
      properties:
        pk:
          type: integer
        product:
          type: integer
        product_name:
          type: string
          readOnly: true
        quantity:
          type: integer
          maximum: 2147483647
          minimum: 0
        unit_price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
      required:
      - product
      - product_name
      - unit_price
    PatchedCategory:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 100
        slug:
          type: string
          maxLength: 100
          pattern: ^[-a-zA-Z0-9_]+$
    PatchedOrder:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        customer_name:
          type: string
          maxLength: 200
        status:
          $ref: '#/components/schemas/StatusEnum'
        created_at:
          type: string
          format: date-time
          readOnly: true
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
    PatchedProduct:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 200
        description:
          type: string
        price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        in_stock:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
        category:
          type: integer
          nullable: true
        category_name:
          type: string
          readOnly: true
        supplier:
          type: integer
        supplier_name:
          type: string
          readOnly: true
    PatchedSupplier:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 200
        email:
          type: string
          format: email
          maxLength: 254
    Product:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 200
        description:
          type: string
        price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        in_stock:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
        category:
          type: integer
          nullable: true
        category_name:
          type: string
          readOnly: true
        supplier:
          type: integer
        supplier_name:
          type: string
          readOnly: true
      required:
      - category_name
      - created_at
      - id
      - name
      - price
      - supplier
      - supplier_name
    StatusEnum:
      enum:
      - pending
      - paid
      - shipped
      - cancelled
      type: string
      description: |-
        * `pending` - Pending
        * `paid` - Paid
        * `shipped` - Shipped
        * `cancelled` - Cancelled
    Supplier:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 200
        email:
          type: string
          format: email
          maxLength: 254
      required:
      - id
      - name
    Token:
      type: object
      description: 'Login response: the auth token to send as ``Authorization: Bearer``.'
      properties:
        token:
          type: string
          readOnly: true
      required:
      - token
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionid
